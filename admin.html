<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SafeQR Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e0e7ff;
      min-height: 100vh;
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #1e293b;
    }
    ::-webkit-scrollbar-thumb {
      background: #4f46e5;
      border-radius: 10px;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: linear-gradient(90deg, #111827, #1e293b);
      border-bottom: 2px solid #6366f1;
      box-shadow: 0 2px 10px rgb(99 102 241 / 0.4);
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
    }
    .nav-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-weight: 700;
      font-size: 1.75rem;
      color: #6366f1;
      text-shadow: 0 0 10px #6366f1aa;
      user-select: none;
    }
    nav a {
      color: #c7d2fe;
      font-weight: 600;
      margin-left: 2rem;
      text-decoration: none;
      padding: 0.25rem 0.5rem;
      border-radius: 0.375rem;
      transition: color 0.3s ease, background-color 0.3s ease;
      user-select: none;
    }
    nav a:hover,
    nav a:focus {
      color: #a5b4fc;
      background-color: rgba(99, 102, 241, 0.15);
      outline: none;
    }
    .card {
      background: #1e293b;
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      max-width: 420px;
      margin: 4rem auto 3rem;
      box-shadow: 0 15px 40px rgb(99 102 241 / 0.5);
    }
    .card h2 {
      font-size: 2.25rem;
      font-weight: 700;
      margin-bottom: 2rem;
      text-align: center;
      color: #a5b4fc;
      text-shadow: 0 0 10px #6366f1aa;
    }
    input {
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 0.75rem;
      padding: 0.85rem 1.25rem;
      color: #e0e7ff;
      font-size: 1rem;
      transition: border-color 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
    }
    input:focus {
      border-color: #6366f1;
      outline: none;
      background: #1e293b;
      box-shadow: 0 0 12px #6366f1cc;
    }
    button {
      background: #6366f1;
      color: #e0e7ff;
      font-weight: 700;
      padding: 1rem 0;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgb(99 102 241 / 0.6);
    }
    button:hover:not(:disabled) {
      background: #4f46e5;
      box-shadow: 0 0 30px #4f46e5cc;
    }
    #loginMessage, #signupMessage { min-height: 1.5rem; text-align: center; font-weight: 600; }
    .hidden { display: none !important; }
    main { max-width: 1280px; margin: 0 auto 4rem; padding: 0 1rem; }
    .section-heading {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 2rem;
      color: #a5b4fc;
    }
    .table-card {
      background: #1e293b;
      border-radius: 1rem;
      padding: 2rem 2.5rem;
      overflow-x: auto;
      border: 1px solid #6366f144;
      box-shadow: 0 10px 30px rgb(99 102 241 / 0.3);
    }
    table { width: 100%; border-spacing: 0 0.75rem; min-width: 600px; }
    thead th {
      padding: 0.75rem 1.5rem;
      font-weight: 700;
      color: #c7d2fe;
      text-align: left;
      border-bottom: 2px solid #4f46e5;
    }
    tbody tr { background: #0f172a; border-radius: 0.75rem; transition: transform 0.3s ease, background-color 0.3s ease; }
    tbody tr:hover { transform: translateY(-4px); background: #6366f1; color: white; }
    tbody td { padding: 1rem 1.5rem; vertical-align: middle; }
    .action-btn {
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 0.9rem;
      border: none; cursor: pointer; color: white;
    }
    .action-approve { background-color: #14b8a6; } /* teal-500 */
    .action-approve:hover { background-color: #0d9488; } /* teal-600 */
    .action-reject { background-color: #ef4444; } /* red-500 */
    .action-reject:hover { background-color: #dc2626; } /* red-600 */
    #logoutBtn {
      background: transparent;
      border: 2px solid #6366f1;
      color: #6366f1;
      font-weight: 600;
      padding: 0.4rem 1rem;
      border-radius: 9999px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.9rem;
      margin-left: 1rem;
    }
    #logoutBtn:hover { background: #6366f1; color: white; box-shadow: 0 0 15px #6366f1cc; }
  </style>
</head>
<body>
  <header id="navbar">
    <div class="nav-container">
      <div class="logo">SafeQR Admin</div>
      <nav>
        <a href="#" id="showLogin">Login</a>
        <a href="#" id="showSignup">Signup</a>
      </nav>
    </div>
  </header>

  <section class="card" id="loginCard">
    <h2>Admin Login</h2>
    <form id="loginForm" class="flex flex-col gap-5">
      <input type="email" id="loginEmail" placeholder="Email" required autocomplete="username" />
      <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password" />
      <button type="submit" id="loginBtn">Login</button>
      <p id="loginMessage"></p>
    </form>
  </section>

  <section class="card hidden" id="signupCard">
    <h2>Admin Signup</h2>
    <form id="signupForm" class="flex flex-col gap-5">
      <input type="text" id="signupName" placeholder="Name" required autocomplete="name" />
      <input type="email" id="signupEmail" placeholder="Email" required autocomplete="email" />
      <input type="password" id="signupPassword" placeholder="Password" required autocomplete="new-password" />
      <button type="submit" id="signupBtn">Signup</button>
      <p id="signupMessage"></p>
    </form>
  </section>

  <main class="hidden" id="dashboard">
    <div class="flex justify-end mb-4">
        <button id="logoutBtn">Logout</button>
    </div>
    <h2 class="section-heading">Pending User Approvals</h2>
    <section class="table-card">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Document</th>
              <th class="text-center">Action</th>
            </tr>
          </thead>
          <tbody id="userTable"></tbody>
        </table>
    </section>
  </main>

<script>
// --- CONFIGURATION & DOM ELEMENTS ---
const API_BASE = "https://safeqr.life"; // FIX: Consistent API URL
const loginCard = document.getElementById("loginCard");
const signupCard = document.getElementById("signupCard");
const dashboard = document.getElementById("dashboard");
const showLogin = document.getElementById("showLogin");
const showSignup = document.getElementById("showSignup");
const loginForm = document.getElementById("loginForm");
const signupForm = document.getElementById("signupForm");
const loginMessage = document.getElementById("loginMessage");
const signupMessage = document.getElementById("signupMessage");
const logoutBtn = document.getElementById("logoutBtn");
const userTable = document.getElementById("userTable");

// --- HELPER FUNCTIONS ---
function showLoginScreen() {
  loginCard.classList.remove("hidden");
  signupCard.classList.add("hidden");
  dashboard.classList.add("hidden");
  loginMessage.textContent = "";
}

// --- EVENT LISTENERS ---
showLogin.addEventListener("click", (e) => { e.preventDefault(); showLoginScreen(); });
showSignup.addEventListener("click", (e) => {
  e.preventDefault();
  signupCard.classList.remove("hidden");
  loginCard.classList.add("hidden");
  dashboard.classList.add("hidden");
  loginMessage.textContent = "";
  signupMessage.textContent = "";
});
logoutBtn.addEventListener("click", () => {
  localStorage.removeItem("adminToken");
  showLoginScreen();
});

// --- API INTERACTIONS ---

// Admin Signup
signupForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  const name = document.getElementById("signupName").value.trim();
  const email = document.getElementById("signupEmail").value.trim();
  const password = document.getElementById("signupPassword").value.trim();
  signupMessage.textContent = "Registering...";

  try {
    const res = await fetch(`${API_BASE}/api/admin/register`, { // Use specific admin registration route
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, password }),
    });
    const data = await res.json();
    signupMessage.textContent = data.msg || data.error;
    if (data.success) signupForm.reset();
  } catch (err) {
    signupMessage.textContent = "⚠️ Network error during signup.";
  }
});

// Admin Login
loginForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value.trim();
  loginMessage.textContent = "Logging in...";

  try {
    const res = await fetch(`${API_BASE}/api/admin/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();

    if (!data.token) {
      loginMessage.textContent = data.error || "Login failed";
      return;
    }
    localStorage.setItem("adminToken", data.token);
    loginMessage.textContent = "✅ Login successful!";
    loginCard.classList.add("hidden");
    dashboard.classList.remove("hidden");
    loadPendingUsers();
  } catch (err) {
    loginMessage.textContent = "⚠️ Network error during login.";
  }
});

// Load Pending Users for Approval
async function loadPendingUsers() {
  const token = localStorage.getItem("adminToken");
  if (!token) { showLoginScreen(); return; }
  userTable.innerHTML = `<tr><td colspan="6" class="text-center py-4">Loading...</td></tr>`;

  try {
    const res = await fetch(`${API_BASE}/api/admin/pending-users`, {
      headers: { Authorization: `Bearer ${token}` },
    });
    const data = await res.json();

    if (!data.success) {
      userTable.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-red-400">${data.msg || "Failed to load"}</td></tr>`;
      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem("adminToken");
        showLoginScreen();
      }
      return;
    }

    if (data.users.length === 0) {
      userTable.innerHTML = `<tr><td colspan="6" class="text-center py-4">No pending users</td></tr>`;
      return;
    }

    userTable.innerHTML = "";
    data.users.forEach((user) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${user.id}</td>
        <td>${user.name}</td>
        <td>${user.email}</td>
        <td>${user.role}</td>
        <td>${ user.jobProof ? `<a href="${API_BASE}/uploads/jobProofs/${user.jobProof}" target="_blank" class="text-indigo-400 underline">View</a>` : "N/A"}</td>
        <td class="flex justify-center gap-2">
          <button class="action-btn action-approve" data-id="${user.id}">Approve</button>
          <button class="action-btn action-reject" data-id="${user.id}">Reject</button>
        </td>`;
      userTable.appendChild(tr);
    });

    document.querySelectorAll(".action-approve").forEach(btn => btn.addEventListener("click", () => handleUserAction(btn.dataset.id, true)));
    document.querySelectorAll(".action-reject").forEach(btn => btn.addEventListener("click", () => handleUserAction(btn.dataset.id, false)));
  } catch (err) {
    userTable.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-red-400">Network error</td></tr>`;
  }
}

// Handle Approve/Reject Action
async function handleUserAction(userId, isApproved) {
  const token = localStorage.getItem("adminToken");
  if (!token) { showLoginScreen(); return; }
  
  const action = isApproved ? "approve" : "reject";
  
  try {
    const res = await fetch(`${API_BASE}/api/admin/user/${userId}/${action}`, { // FIX: Correct endpoint
      method: "POST",
      headers: { Authorization: `Bearer ${token}` },
    });
    const data = await res.json();
    if (!data.success) {
        alert(data.msg || "Action failed");
    }
    loadPendingUsers(); // Refresh the list
  } catch (err) {
    alert("Network error during action.");
  }
}

// --- INITIALIZATION ---
if (localStorage.getItem("adminToken")) {
  loginCard.classList.add("hidden");
  signupCard.classList.add("hidden");
  dashboard.classList.remove("hidden");
  loadPendingUsers();
  setInterval(loadPendingUsers, 30000); // Auto-refresh every 30s
}
</script>

</body>
</html>
