<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SafeQR - Signup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    input:focus, select:focus {
      outline: none;
      border-color: #14b8a6;
      box-shadow: 0 0 8px 2px rgba(20,184,166,0.5);
      transition: box-shadow 0.3s ease, border-color 0.3s ease;
    }
    input:invalid:not(:focus):not(:placeholder-shown), select:invalid:not(:focus) {
      border-color: #ef4444;
      box-shadow: 0 0 6px 1px rgba(239,68,68,0.5);
    }
    button:hover { box-shadow: 0 0 12px 3px rgba(99,102,241,0.7); transition: 0.3s; }
    .stepper-circle { transition: 0.3s; }
    @media (prefers-color-scheme: dark) {
      body { background-color: #1e293b; color: #e0e7ff; }
      .card { background: #334155; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
      input, select { background-color: #475569; color: #e0e7ff; border-color: #64748b; }
      input:focus, select:focus { border-color: #22d3ee; box-shadow: 0 0 8px 2px rgba(34,211,238,0.6); }
      input:invalid:not(:focus):not(:placeholder-shown), select:invalid:not(:focus) {
        border-color: #f87171; box-shadow: 0 0 6px 1px rgba(248,113,113,0.6);
      }
      button { background-color: #4f46e5; color: #e0e7ff; }
      button:hover { box-shadow: 0 0 14px 4px rgba(99,102,241,0.9); }
      a { color: #22d3ee; }
      a:hover { text-decoration: underline; }
      #message { color: #a5b4fc; }
      .stepper-circle { background-color: #64748b; color: #cbd5e1; }
      .stepper-circle.active { background-color: #22d3ee; color: #334155; }
      .stepper-line { background-color: #64748b; }
      .stepper-line.active { background-color: #22d3ee; }
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-[#1e293b] flex items-center justify-center min-h-screen px-4">
  <main class="card bg-white dark:bg-[#334155] rounded-3xl shadow-2xl max-w-md w-full p-8 sm:p-10">

    <nav aria-label="Progress" class="mb-10">
      <ol class="flex justify-between items-center">
        <li class="flex-1 flex flex-col items-center text-center">
          <div id="step1Circle" class="stepper-circle w-10 h-10 rounded-full bg-teal-500 text-white font-semibold flex items-center justify-center select-none">1</div>
          <span class="mt-2 text-sm font-medium text-gray-700 dark:text-gray-300">Register</span>
        </li>
        <li class="flex-1 flex items-center">
          <div id="stepLine" class="stepper-line h-1 flex-1 bg-teal-300 dark:bg-teal-600 rounded"></div>
        </li>
        <li class="flex-1 flex flex-col items-center text-center">
          <div id="step2Circle" class="stepper-circle w-10 h-10 rounded-full bg-gray-300 dark:bg-slate-600 text-gray-600 dark:text-slate-300 font-semibold flex items-center justify-center select-none">2</div>
          <span class="mt-2 text-sm font-medium text-gray-700 dark:text-gray-300">Verify OTP</span>
        </li>
      </ol>
    </nav>

    <form id="signupForm" class="space-y-6" enctype="multipart/form-data" novalidate>
      <div>
        <label for="name" class="block text-sm font-semibold mb-1 text-gray-700 dark:text-gray-300">Full Name</label>
        <input type="text" id="name" placeholder="John Doe" class="w-full rounded-lg border px-4 py-3 focus:ring-0 focus:border-teal-500" required />
      </div>

      <div>
        <label for="email" class="block text-sm font-semibold mb-1 text-gray-700 dark:text-gray-300">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" class="w-full rounded-lg border px-4 py-3 focus:ring-0 focus:border-teal-500" required />
      </div>

      <div>
    <label for="password" class="block text-sm font-semibold mb-1 text-gray-700 dark:text-gray-300">Password</label>
    <div class="relative">
        <input type="password" id="password" placeholder="••••••••" minlength="8" class="w-full rounded-lg border px-4 py-3 focus:ring-0 focus:border-teal-500" required />
        <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-400">
            <i class="fa fa-eye"></i>
        </button>
    </div>
</div>

<div id="password-strength-requirements" class="mt-2 text-sm space-y-1">
    <p class="text-gray-500 dark:text-gray-400">Password must contain:</p>
    <div id="length" class="requirement flex items-center text-red-500 dark:text-red-400">
        <i class="fa fa-times-circle mr-2"></i> At least 8 characters
    </div>
    <div id="uppercase" class="requirement flex items-center text-red-500 dark:text-red-400">
        <i class="fa fa-times-circle mr-2"></i> An uppercase letter (A-Z)
    </div>
    <div id="number" class="requirement flex items-center text-red-500 dark:text-red-400">
        <i class="fa fa-times-circle mr-2"></i> A number (0-9)
    </div>
    <div id="special" class="requirement flex items-center text-red-500 dark:text-red-400">
        <i class="fa fa-times-circle mr-2"></i> A special character (!, @, #, etc.)
    </div>
</div>

      <div>
        <label for="role" class="block text-sm font-semibold mb-1 text-gray-700 dark:text-gray-300">Select Role</label>
        <select id="role" class="w-full rounded-lg border px-4 py-3 focus:ring-0 focus:border-teal-500" required>
          <option value="" disabled selected>Select Role</option>
          <option value="user">User</option>
          <option value="doctor">Doctor</option>
          <option value="teacher">Teacher</option>
          <option value="traffic">Traffic Police</option>
        </select>
      </div>

      <div id="jobProofContainer" style="display:none;">
        <label>Upload Job Proof (pdf/jpg/png)</label>
        <input type="file" name="job_proof" id="job_proof" accept=".pdf,image/*" />
        <small>Required for selected role</small>
      </div>
      <!-- Referral Code Input Field Added -->
      <div>
        <label for="referralCode" class="block text-sm font-semibold mb-1 text-gray-700 dark:text-gray-300">Referral Code (Optional)</label>
        <input type="text" id="referralCode" placeholder="Enter referral code" class="w-full rounded-lg border px-4 py-3 focus:ring-0 focus:border-teal-500" />
      </div>

      <div class="pt-2">
        <div class="flex items-center">
          <input id="terms" name="terms" type="checkbox" required class="h-4 w-4 rounded border-gray-300 dark:border-gray-600 text-teal-600 focus:ring-teal-500 dark:bg-slate-600 cursor-pointer">
          <label for="terms" class="ml-3 block text-sm text-gray-700 dark:text-gray-300">
            I agree to the
            <a href="terms&condition.html" target="_blank" class="font-semibold text-teal-600 dark:text-cyan-400 hover:underline">Terms of Service</a>
            and
            <a href="privacypolicy.html" target="_blank" class="font-semibold text-teal-600 dark:text-cyan-400 hover:underline">Privacy Policy</a>.
          </label>
        </div>
      </div>

      <button type="submit" class="w-full py-3 rounded-xl bg-teal-600 text-white font-semibold text-lg shadow-md hover:bg-teal-700">Signup</button>
    </form>

    <section id="otpSection" class="hidden mt-8 space-y-6">
      <h3 class="text-xl font-semibold text-gray-800 dark:text-gray-200 text-center mb-4">Verify Your Email</h3>
      <input type="text" id="otp" placeholder="Enter OTP" inputmode="numeric" pattern="[0-9]*" maxlength="6" class="w-full rounded-lg border px-4 py-3 focus:ring-0 focus:border-indigo-500" />
      <button id="verifyOtpBtn" class="w-full py-3 rounded-xl bg-indigo-600 text-white font-semibold text-lg shadow-md hover:bg-indigo-700">Verify OTP</button>
    </section>

    <p id="message" class="text-center text-sm text-gray-600 dark:text-gray-300 mt-6 min-h-[1.5rem] select-none"></p>
    <p class="text-center text-sm mt-8 text-gray-700 dark:text-gray-300">
      Already have an account?&nbsp;<a href="login.html" class="font-semibold text-teal-600 dark:text-cyan-400 hover:underline">Login</a>
    </p>
  </main>

<script>
    // ================== DOM ELEMENTS ==================
    const API_BASE_URL = "https://safeqr.life/api/auth";
    const signupForm = document.getElementById("signupForm");
    const otpSection = document.getElementById("otpSection");
    const msgBox = document.getElementById("message");
    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');
    const signupButton = document.querySelector('button[type="submit"]');
    const roleEl = document.getElementById('role');
    const jobProofContainer = document.getElementById('jobProofContainer');
    const verifyOtpBtn = document.getElementById("verifyOtpBtn");
    const step1Circle = document.getElementById("step1Circle");
    const step2Circle = document.getElementById("step2Circle");
    const stepLine = document.getElementById("stepLine");
    const referralCodeInput = document.getElementById("referralCode");
    const reqs = {
        length: document.getElementById('length'),
        uppercase: document.getElementById('uppercase'),
        number: document.getElementById('number'),
        special: document.getElementById('special')
    };
    
    let userEmail = "";

    // ================== FUNCTIONS ==================
    function setStep(step){
        if(step === 1){
            step1Circle.classList.add("bg-teal-500","text-white");
            step2Circle.classList.remove("bg-indigo-500","text-white");
            stepLine.classList.add("bg-teal-300");
        } else {
            step1Circle.classList.remove("bg-teal-500","text-white");
            step2Circle.classList.add("bg-indigo-500","text-white");
            stepLine.classList.remove("bg-teal-300");
            stepLine.classList.add("bg-indigo-500");
        }
    }

    function validate(element, isValid) {
        const icon = element.querySelector('i');
        if (isValid) {
            element.classList.remove('text-red-500', 'dark:text-red-400');
            element.classList.add('text-green-500', 'dark:text-green-400');
            icon.classList.remove('fa-times-circle');
            icon.classList.add('fa-check-circle');
        } else {
            element.classList.remove('text-green-500', 'dark:text-green-400');
            element.classList.add('text-red-500', 'dark:text-red-400');
            icon.classList.remove('fa-check-circle');
            icon.classList.add('fa-times-circle');
        }
    }
    
    // ================== EVENT LISTENERS ==================

    // Password Strength Validation Logic
    passwordInput.addEventListener('input', () => {
        const value = passwordInput.value;
        
        const isLengthValid = value.length >= 8;
        const isUppercaseValid = /[A-Z]/.test(value);
        const isNumberValid = /[0-9]/.test(value);
        const isSpecialValid = /[!@#$%^&*(),.?":{}|<>]/.test(value);
        
        validate(reqs.length, isLengthValid);
        validate(reqs.uppercase, isUppercaseValid);
        validate(reqs.number, isNumberValid);
        validate(reqs.special, isSpecialValid);
        
        const allValid = isLengthValid && isUppercaseValid && isNumberValid && isSpecialValid;

        signupButton.disabled = !allValid;
        signupButton.style.opacity = allValid ? '1' : '0.5';
        signupButton.style.cursor = allValid ? 'pointer' : 'not-allowed';
    });

    // Show/Hide Password Logic
    togglePassword.addEventListener('click', () => {
        const icon = togglePassword.querySelector('i');
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
    });

    // Show job proof input based on role
    roleEl.addEventListener('change', () => {
        const r = roleEl.value;
        if(["traffic","doctor","teacher"].includes(r)){
            jobProofContainer.style.display = 'block';
            document.getElementById('job_proof').required = true;
        } else {
            jobProofContainer.style.display = 'none';
            document.getElementById('job_proof').required = false;
        }
    });

    // Submit signup form
    signupForm.addEventListener('submit', async e => {
        e.preventDefault();
        
        if (!document.getElementById("terms").checked) {
            msgBox.textContent = "❌ Please agree to the Terms of Service and Privacy Policy.";
            msgBox.className = "text-red-600 dark:text-red-400 text-center mt-3";
            return;
        }

        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = passwordInput.value;
        const role = roleEl.value;
        const jobProofInput = document.getElementById("job_proof");
        const referralCode = referralCodeInput.value.trim(); // Get referral code
        const formData = new FormData();
        formData.append("name", name);
        formData.append("email", email);
        formData.append("password", password);
        formData.append("role", role);
        formData.append("referralCode", referralCode); // Append referral code
        if(jobProofContainer.style.display === 'block' && jobProofInput.files[0]){
            formData.append("job_proof", jobProofInput.files[0]);
        }

        try {
            const res = await fetch(`${API_BASE_URL}/register`, { method: "POST", body: formData });
            const json = await res.json();
            if (res.ok && json.success) {
                userEmail = email;
                msgBox.textContent = "✅ OTP sent to your email. Enter it below.";
                msgBox.className = "text-green-600 dark:text-green-400 text-center mt-3";
                signupForm.classList.add("hidden");
                otpSection.classList.remove("hidden");
                setStep(2);
            } else {
                msgBox.textContent = "❌ " + (json.error || json.message || "Signup failed");
                msgBox.className = "text-red-600 dark:text-red-400 text-center mt-3";
            }
        } catch(err) {
            console.error(err);
            msgBox.textContent = "⚠️ Server error. Try again later.";
            msgBox.className = "text-yellow-600 dark:text-yellow-400 text-center mt-3";
        }
    });

    // Verify OTP
    verifyOtpBtn.addEventListener("click", async () => {
        const otp = document.getElementById("otp").value.trim();
        if (!/^\d{6}$/.test(otp)) {
            msgBox.textContent = "❌ Enter 6-digit OTP";
            msgBox.className = "text-red-600 dark:text-red-400 text-center mt-3";
            return;
        }

        try {
            const res = await fetch(`${API_BASE_URL}/verify-email`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ email: userEmail, otp })
            });
            const data = await res.json();
            if (res.ok && data.success) {
                msgBox.textContent = "✅ Email verified successfully. Redirecting to login...";
                msgBox.className = "text-green-600 dark:text-green-400 text-center mt-3";
                otpSection.classList.add("hidden");
                setTimeout(() => window.location.href = "login.html", 2000);
            } else {
                msgBox.textContent = "❌ " + (data.error || data.message || "OTP verification failed");
                msgBox.className = "text-red-600 dark:text-red-400 text-center mt-3";
            }
        } catch(err) {
            console.error(err);
            msgBox.textContent = "⚠️ Server error. Try again later.";
            msgBox.className = "text-yellow-600 dark:text-yellow-400 text-center mt-3";
        }
    });
    
    // ================== INITIAL SETUP ==================
    setStep(1);
    signupButton.disabled = true;
    signupButton.style.opacity = '0.5';
    signupButton.style.cursor = 'not-allowed';
</script>
</body>
</html>
