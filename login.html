<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SafeQR - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e0e7ff;
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #6366f1; }

    nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: saturate(180%) blur(10px);
      box-shadow: 0 2px 10px rgb(99 102 241 / 0.4);
      transition: background-color 0.3s ease;
    }
    nav.scrolled {
      background: #1e293b;
      box-shadow: 0 4px 15px rgb(99 102 241 / 0.7);
    }
    nav .container {
      max-width: 1280px; margin: 0 auto;
      padding: 0.75rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    nav .logo {
      font-weight: 700; font-size: 1.5rem;
      color: #6366f1; letter-spacing: 0.05em;
      user-select: none; cursor: default;
      text-shadow: 0 0 8px #6366f1aa;
    }
    nav ul { display: flex; gap: 1.5rem; list-style: none; margin: 0; padding: 0; }
    nav ul li a {
      color: #c7d2fe; font-weight: 600; font-size: 1rem;
      padding: 0.5rem 0.75rem; border-radius: 0.375rem;
      transition: all 0.3s ease; position: relative;
      overflow: hidden; text-decoration: none;
    }
    nav ul li a::after {
      content: ""; position: absolute; bottom: 0; left: 50%;
      width: 0; height: 2px; background: #6366f1;
      transition: width 0.3s ease, left 0.3s ease;
      border-radius: 2px;
    }
    nav ul li a:hover, nav ul li a:focus { color: #a5b4fc; outline: none; }
    nav ul li a:hover::after, nav ul li a:focus::after { width: 100%; left: 0; }

    .hero-carousel {
      position: relative; width: 100%; max-height: 420px;
      overflow: hidden; border-radius: 1rem;
      margin: 2rem auto 3rem; max-width: 1280px;
      box-shadow: 0 10px 30px rgb(99 102 241 / 0.4);
      background: #1e293b;
    }
    .hero-slide {
      position: absolute; inset: 0; opacity: 0;
      transition: opacity 1s ease;
      display: flex; align-items: center; justify-content: space-between;
      padding: 2rem 3rem; color: #e0e7ff;
      user-select: none; pointer-events: none;
    }
    .hero-slide.active { opacity: 1; position: relative; z-index: 10; pointer-events: auto; }
    .hero-slide .text-content { max-width: 50%; animation: slideUpFade 1s ease forwards; }
    .hero-slide h1 {
      font-size: 2.75rem; font-weight: 700; line-height: 1.1;
      margin-bottom: 1rem; color: #6366f1;
      text-shadow: 0 0 10px #6366f1aa;
    }
    .hero-slide p { font-size: 1.125rem; line-height: 1.5; margin-bottom: 1.5rem; color: #c7d2fe; }
    .hero-slide .btn-primary {
      background: #6366f1; color: #e0e7ff; font-weight: 600;
      padding: 0.75rem 2rem; border-radius: 9999px;
      box-shadow: 0 0 15px #6366f1aa;
      transition: all 0.3s ease; cursor: pointer; user-select: none;
      border: none; font-size: 1rem; text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .hero-slide .btn-primary:hover { background: #4f46e5; box-shadow: 0 0 25px #4f46e5cc; }
    .hero-slide .image-placeholder {
      width: 45%; height: 280px;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      border-radius: 1rem;
      box-shadow: 0 10px 30px rgb(99 102 241 / 0.6);
      display: flex; align-items: center; justify-content: center;
      color: #e0e7ffaa; font-size: 1.5rem; font-weight: 600;
      filter: drop-shadow(0 0 5px #6366f1aa);
      animation: floatUpDown 6s ease-in-out infinite;
    }
    .hero-dots {
      position: absolute; bottom: 1rem; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 0.75rem; z-index: 20;
    }
    .hero-dots button {
      width: 14px; height: 14px; border-radius: 50%; border: none;
      background: #94a3b8; cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .hero-dots button.active, .hero-dots button:hover { background: #6366f1; box-shadow: 0 0 10px #6366f1cc; }

    .login-card {
      background: #1e293b;
      max-width: 400px; margin: 0 auto 4rem;
      border-radius: 1rem;
      padding: 2.5rem 2rem 3rem;
      box-shadow: 0 15px 40px rgb(99 102 241 / 0.5);
      transition: box-shadow 0.3s ease;
    }
    .login-card:hover { box-shadow: 0 20px 50px rgb(99 102 241 / 0.8); }
    .login-card h2 {
      font-size: 2rem; font-weight: 700; color: #a5b4fc;
      margin-bottom: 2rem; text-align: center;
      text-shadow: 0 0 8px #6366f1aa;
    }
    form#loginForm { display: flex; flex-direction: column; gap: 1.5rem; }
    form#loginForm input {
      background: #0f172a; border: 2px solid #334155;
      border-radius: 0.75rem; padding: 0.75rem 1rem;
      font-size: 1rem; color: #e0e7ff;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      box-shadow: inset 0 0 8px #334155aa;
    }
    form#loginForm input:focus {
      border-color: #6366f1; box-shadow: 0 0 10px #6366f1cc;
      background: #1e293b;
    }
    form#loginForm button {
      background: #6366f1; color: #e0e7ff; font-weight: 700;
      padding: 0.85rem 0; border-radius: 9999px;
      font-size: 1.125rem; box-shadow: 0 0 15px #6366f1aa;
      border: none; cursor: pointer; transition: all 0.3s ease;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    form#loginForm button:hover { background: #4f46e5; box-shadow: 0 0 25px #4f46e5cc; }
    #message { min-height: 1.5rem; font-weight: 600; font-size: 0.9rem; margin-top: 1rem; text-align: center; }

    .signup-text { text-align: center; font-size: 0.9rem; color: #94a3b8; margin-top: 1.25rem; }
    .signup-text a { color: #6366f1; font-weight: 600; }
    .signup-text a:hover { color: #4f46e5; text-decoration: underline; }

    @media (max-width: 1024px) { .hero-slide .text-content { max-width: 60%; } .hero-slide .image-placeholder { display: none; } }
    @media (max-width: 640px) {
      .hero-slide { flex-direction: column; padding: 1.5rem; max-height: 360px; }
      .hero-slide .text-content { max-width: 100%; text-align: center; }
      .hero-slide h1 { font-size: 1.75rem; }
      .hero-slide p { font-size: 1rem; }
      .login-card { margin: 0 1rem 3rem; padding: 2rem 1.5rem 2.5rem; }
    }

    @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes floatUpDown { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav id="navbar">
    <div class="container">
      <div class="logo">SafeQR</div>
      <ul>
        <li><a href="index.html" aria-current="page">Home</a></li>
        <li><a href="signup.html">Signup</a></li>
        </ul>
    </div>
  </nav>



  <!-- Login Card -->
  <main>
  <section class="login-card">
    <h2 class="text-2xl font-bold mb-4 text-white">Login</h2>
    <form id="loginForm" novalidate class="flex flex-col gap-3">
  <input type="email" id="email" placeholder="Email" required autocomplete="email" />
  <div class="relative">
    <input type="password" id="password" placeholder="Password" required autocomplete="current-password" class="w-full pr-10" />
    <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-400">
        <i class="fa fa-eye"></i>
    </button>
</div>
  <button type="submit">Login</button>

  <!-- Error / Message Display -->
  <p id="loginError" class="text-red-500 mt-2 font-semibold"></p>
</form>


    <p class="signup-text text-white mt-4">
      Don't have an account? <a href="signup.html" class="text-blue-400 underline">Signup</a>
    </p>
  </section>
</main>

  <script>
(() => {
    // ================== DOM ELEMENTS ==================
    const API_BASE_URL = "https://safeqr.life/api/auth";
    const form = document.getElementById('loginForm');
    const message = document.getElementById('loginError');
    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');

    // ================== EVENT LISTENERS ==================

    // Show/Hide Password Logic
    if (togglePassword) {
        togglePassword.addEventListener('click', () => {
            const icon = togglePassword.querySelector('i');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            // Toggle icon classes
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        });
    }
    
    // Login Form Submit Logic
    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = passwordInput.value; // .trim() yahan se hata diya taaki password me space allow ho

        if (!email || !password) {
            message.textContent = "⚠️ Please fill in all fields.";
            message.style.color = "#f87171";
            return;
        }
        
        const submitButton = form.querySelector('button[type="submit"]');
        submitButton.disabled = true;
        message.textContent = "⏳ Logging in...";
        message.style.color = "#60a5fa";

        try {
            const res = await fetch(`${API_BASE_URL}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (!res.ok) {
                // Server se mile error message ko dikhayein
                message.textContent = "❌ " + (data.error || `Server Error ${res.status}`);
                message.style.color = "#f87171";
                submitButton.disabled = false; // Re-enable button on failure
                return;

            }

            // Success
            localStorage.setItem("token", data.token);
            message.textContent = "✅ Login successful! Redirecting...";
            message.style.color = "#4ade80";

            // Dashboard page par redirect karein
            setTimeout(() => window.location.href = "index.html", 1000);

        } catch (err) {
            console.error("Login error:", err);
            message.textContent = "⚠️ Network / server issue. Please try again.";
            message.style.color = "#facc15";
            submitButton.disabled = false; // Re-enable button on network error
        }
    });
})();
</script>



</body>
</html>
